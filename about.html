<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>About Us — Bhuk.in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<section class="about-hero">
  <div class="container" style="position:relative;z-index:2">
    <div class="s-label" style="color:rgb(22, 131, 18)">Our Story</div>
    <h1 class="about-hero-title" id="a-title">About Us</h1>
    <p class="about-hero-desc" id="a-desc"></p>
  </div>
</section>
<section style="background:var(--white);padding:0 0 60px">
  <div class="container"><div class="stats-row reveal" id="stats-row"></div></div>
</section>
<section class="section" style="background:var(--cream-dark)">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start">
      <div class="reveal-left">
        <div class="s-label">What drives us</div>
        <h2 class="s-title" id="a-mt"></h2><div class="s-divider"></div>
        <p class="s-sub" id="a-mv"></p>
      </div>
      <div class="reveal-right">
        <div class="s-label">Where we're going</div>
        <h2 class="s-title" id="a-vt"></h2><div class="s-divider"></div>
        <p class="s-sub" id="a-vv"></p>
      </div>
    </div>
  </div>
</section>
<section class="section" style="background:var(--white)" id="services">
  <div class="container">
    <div class="tc reveal"><div class="s-label">What we stand for</div><h2 class="s-title">Our Core <span class="hi">Values</span></h2><div class="s-divider"></div></div>
    <div class="values-grid" id="val-grid" style="margin-top:48px"></div>
  </div>
</section>
<section class="section" style="background:var(--cream-dark)">
  <div class="container">
    <div class="tc reveal"><div class="s-label">The people behind bhuk.in</div><h2 class="s-title">Meet Our <span class="hi">Team</span></h2><div class="s-divider"></div></div>
    <div class="team-grid" id="team-grid" style="margin-top:48px"></div>
  </div>
</section>
<section style="background:var(--navy-mid);padding:80px 0;text-align:center;position:relative;overflow:hidden">
  <div style="position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.1),transparent 65%)"></div>
  <div class="container" style="position:relative;z-index:2">
    <div class="s-label" style="justify-content:center;color:rgb(22, 131, 18)">Join Us</div>
    <h2 style="font-family:var(--ff-display);font-size:clamp(26px,4vw,44px);font-weight:700;color:var(--white);margin-bottom:14px">Hungry for something <span style="color:var(--gold)">great?</span></h2>
    <p style="font-size:15px;color:rgba(0, 0, 0, 0.77);margin-bottom:32px;max-width:460px;margin-left:auto;margin-right:auto">Order now or partner with us to grow your restaurant business.</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
      <a href="index.html" class="btn btn-gold" style="padding:14px 32px;font-size:15px">Order Food Now</a>
      <a href="merchant-signup.html" class="btn btn-ghost" style="padding:14px 32px;font-size:15px">Become a Partner</a>
    </div>
  </div>
</section>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded',()=>{
    const a=BHUK.about;
    document.getElementById('a-title').textContent=a.title;
    document.getElementById('a-desc').textContent=a.hero_desc;
    document.getElementById('a-mt').textContent=a.mission_title;
    document.getElementById('a-mv').textContent=a.mission_text;
    document.getElementById('a-vt').textContent=a.vision_title;
    document.getElementById('a-vv').textContent=a.vision_text;
    document.getElementById('stats-row').innerHTML=a.stats.map(s=>`<div class="stat-box"><div class="stat-val">${s.value}</div><div class="stat-lbl">${s.label}</div></div>`).join('');
    document.getElementById('val-grid').innerHTML=a.values.map((v,i)=>`<div class="value-card reveal" style="transition-delay:${i*.1}s"><div class="value-icon">${v.icon}</div><div class="value-title">${v.title}</div><div class="value-desc">${v.desc}</div></div>`).join('');
    document.getElementById('team-grid').innerHTML=a.team.map((t,i)=>{
      const ini=t.name.split(' ').map(n=>n[0]).join('');
      return `<div class="team-card reveal" style="transition-delay:${i*.1}s">
        <img class="team-avatar" src="${t.avatar}" alt="${t.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="team-avatar-ph" style="display:none">${ini}</div>
        <div class="team-name">${t.name}</div><div class="team-role">${t.role}</div>
      </div>`;
    }).join('');
    setTimeout(initReveal,60);
  });
</script>
</body></html>
