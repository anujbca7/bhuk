<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Forgot Password — Bhuk.in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="form-page">
  <div class="form-main">
    <div class="form-card">
      <h2 style="font-family:var(--ff-display);font-size:22px;font-weight:700;text-align:center;margin-bottom:12px;color:var(--text-dark)">Let's Get your account back!</h2>
      <p style="font-size:13px;color:var(--text-light);text-align:center;line-height:1.65;margin-bottom:28px">Please specify your email address to receive instructions for resetting it. If an account exists by that email, we will send a password reset</p>
      <form onsubmit="handleReset(event)">
        <div class="f-group"><input type="email" class="f-input" id="remail" placeholder="Email" required></div>
        <button type="submit" class="f-submit active" id="resetbtn">Reset Password</button>
      </form>
      <div class="f-bottom" style="margin-top:14px">Have an account? <a href="login.html">Sign in</a></div>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="data/data.js"></script><script src="js/main.js"></script>
<script>
  function handleReset(e){
    e.preventDefault();const btn=document.getElementById('resetbtn');
    btn.textContent='Sending...';btn.disabled=true;
    setTimeout(()=>{btn.textContent='✓ Reset email sent!';setTimeout(()=>{btn.textContent='Reset Password';btn.disabled=false;},3000);},1000);
  }
</script>
</body></html>
